---
on:
  pull_request:

name: Integration tests on cloud providers

jobs:
  build-binaries:
    name: Build binaries
    uses: ./.github/workflows/build.yml

  gcp:
    strategy:
      fail-fast: false
      matrix:
        distrib: [ubuntu]  # rhel
        techno: [sev]  # tdx
    name: GCP
    needs:
      - build-binaries
    secrets: inherit
    uses: ./.github/workflows/gcp.yml
    with:
      techno: ${{ matrix.techno }}
      distrib: ${{ matrix.distrib }}

  azure:
    strategy:
      fail-fast: false
      matrix:
        distrib: [ubuntu]  # rhel
        techno: [sev]  # tdx
    name: Azure
    needs:
      - build-binaries
    secrets: inherit
    uses: ./.github/workflows/azure.yml
    with:
      techno: ${{ matrix.techno }}
      distrib: ${{ matrix.distrib }}

  aws:
    strategy:
      fail-fast: false
      matrix:
        distrib: [ubuntu]  # rhel
        techno: [sev]  # tdx
    name: AWS
    needs:
      - build-binaries
    secrets: inherit
    uses: ./.github/workflows/aws.yml
    with:
      techno: ${{ matrix.techno }}
      distrib: ${{ matrix.distrib }}
